name: GV Keep-Alive Multi

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pulse LC
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_LC }}
        run: python main.py

      - name: Pulse YZ
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_YZ }}
        run: python main.py

      - name: Pulse LZ
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_LZ }}
        run: python main.py

      - name: Pulse XC
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_XC }}
        run: python main.py

      - name: Pulse PR
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_PR }}
        run: python main.py

      - name: Pulse HM
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_HM }}
        run: python main.py

      - name: Update keepalive log
        run: |
          echo "Last multi-run: $(date)" > keepalive.log
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keepalive.log
          git commit -m "Auto-update keepalive log [skip ci]" || echo "No changes to commit"
          git push
