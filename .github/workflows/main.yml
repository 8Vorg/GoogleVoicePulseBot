name: GV Keep-Alive Multi
on:
  schedule:
    - cron: '0 23 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Google API Dependencies
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
        
      - name: Pulse LC
        continue-on-error: true
        env:
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN_LC }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_LC }}
        run: python main.py

      - name: Pulse YZ
        continue-on-error: true
        env:
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN_YZ }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_YZ }}
        run: python main.py

      - name: Pulse LZ
        continue-on-error: true
        env:
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN_LZ }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_LZ }}
        run: python main.py

      - name: Pulse XC
        continue-on-error: true
        env:
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN_XC }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_XC }}
        run: python main.py

      - name: Pulse PR
        continue-on-error: true
        env:
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN_PR }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_PR }}
        run: python main.py

      - name: Pulse 8V
        continue-on-error: true
        env:
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN_8V }}
          GV_GATEWAY: ${{ secrets.GV_GATEWAY_8V }}
        run: python main.py

      - name: Update keepalive log
        run: |
          echo "Last multi-run: $(date)" > keepalive.log
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keepalive.log
          git commit -m "Auto-update keepalive log [skip ci]" || echo "No changes to commit"
          git push
